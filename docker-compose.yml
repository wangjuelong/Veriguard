name: veriguard

services:
  veriguard-pgsql:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: veriguard
      POSTGRES_PASSWORD: veriguard
      POSTGRES_DB: veriguard
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veriguard -d veriguard"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - veriguard-pgdata:/var/lib/postgresql/data
    networks: [veriguard-net]

  veriguard-rabbitmq:
    image: rabbitmq:4.2-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [veriguard-net]

  veriguard-minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - veriguard-miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [veriguard-net]

  veriguard-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    volumes:
      - veriguard-esdata:/usr/share/elasticsearch/data
    networks: [veriguard-net]

  veriguard-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: veriguard-app:dev
    container_name: veriguard-app
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/application-prod.properties:/config/application-prod.properties:ro
    environment:
      # SOC Elastic connector (PRD §2.4, spec §4.4) — defaults disabled; ops sets credentials in .env to enable.
      VERIGUARD_SOC_ELASTIC_ENABLED: ${VERIGUARD_SOC_ELASTIC_ENABLED:-false}
      VERIGUARD_SOC_ELASTIC_URL: ${VERIGUARD_SOC_ELASTIC_URL:-}
      VERIGUARD_SOC_ELASTIC_API_KEY: ${VERIGUARD_SOC_ELASTIC_API_KEY:-}
      VERIGUARD_SOC_ELASTIC_ALERT_INDEX: ${VERIGUARD_SOC_ELASTIC_ALERT_INDEX:-.alerts-security.alerts-*}
      VERIGUARD_SOC_ELASTIC_DETECTION_RULES_API: ${VERIGUARD_SOC_ELASTIC_DETECTION_RULES_API:-/api/detection_engine/rules/_find}
      VERIGUARD_SOC_ELASTIC_QUERY_TIMEOUT_SECONDS: ${VERIGUARD_SOC_ELASTIC_QUERY_TIMEOUT_SECONDS:-10}
      VERIGUARD_SOC_ELASTIC_RULES_CACHE_TTL_SECONDS: ${VERIGUARD_SOC_ELASTIC_RULES_CACHE_TTL_SECONDS:-300}
    command:
      - java
      - -jar
      - veriguard-api.jar
      - --spring.profiles.active=prod
      - --spring.config.additional-location=file:/config/
    depends_on:
      veriguard-pgsql:
        condition: service_healthy
      veriguard-rabbitmq:
        condition: service_healthy
      veriguard-minio:
        condition: service_healthy
      veriguard-elasticsearch:
        condition: service_healthy
    networks: [veriguard-net]

networks:
  veriguard-net:

volumes:
  veriguard-pgdata:
  veriguard-miniodata:
  veriguard-esdata:
