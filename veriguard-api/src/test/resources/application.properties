# Global configuration
# suppress inspection "SpringBootApplicationProperties"
info.app.name=Veriguard
# suppress inspection "SpringBootApplicationProperties"
info.app.version=Testing

# Veriguard configuration
veriguard.base-url=http://localhost:8080
veriguard.admin.email=admin@veriguard.io
veriguard.admin.password=admin
veriguard.admin.token=0d17ce9a-f3a8-4c6d-9721-c98dc3dc023f
veriguard.admin.encryption_key=ThisIsMyUltraSecureEncryptionKey
veriguard.admin.encryption_salt=ilikesaltyfoodnomnom
veriguard.starterpack.enabled=false

# Server configuration
server.servlet.context-path=/

logging.level.root=ERROR
logging.level.org=ERROR

# rabbit mq
veriguard.rabbitmq.hostname=localhost
veriguard.rabbitmq.port=5672
veriguard.rabbitmq.prefix=openbas
veriguard.rabbitmq.user=guest
veriguard.rabbitmq.pass=guest
veriguard.rabbitmq.vhost=/
veriguard.rabbitmq.ssl=false
veriguard.rabbitmq.management-port=15672
veriguard.rabbitmq.queue-type=classic
veriguard.rabbitmq.management-insecure=true
veriguard.rabbitmq.trust-store-password=<trust-store-password>
veriguard.rabbitmq.trust.store=<file:/path/to/client-store.p12>

veriguard.queue-config.inject-trace.publisher-number=1
veriguard.queue-config.inject-trace.consumer-number=1
veriguard.queue-config.inject-trace.worker-number=1
veriguard.queue-config.inject-trace.worker-frequency=2000
veriguard.queue-config.inject-trace.queue-name=inject-trace
veriguard.queue-config.inject-trace.max-size=100
veriguard.queue-config.inject-trace.consumer-qos=30
veriguard.queue-config.inject-trace.publisher-qos=30

# Authenticators
## Local
veriguard.auth-local-enable=false
## Oauth
veriguard.auth-openid-enable=false
## Kerberos
veriguard.auth-kerberos-enable=false

spring.datasource.url=jdbc:postgresql://localhost:5433/veriguard
spring.datasource.username=veriguard
spring.datasource.password=veriguard
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.table=migrations
spring.flyway.locations=classpath:io/veriguard/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.postgresql.transactional-lock=false
spring.profiles.active=test
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true

### ENGINE Configuration
engine.index-prefix=veriguard
engine.index-suffix=-000001
engine.url=http://localhost:9201

# Minio Properties
minio.endpoint=localhost
minio.port=10000
minio.bucket=veriguard
minio.access-key=minioadmin
minio.access-secret=minioadmin

## TTP extraction AI Webservice
ttp.extraction.ai.webservice.url=http://localhost/ttp-extraction

# remediation detection AI Webservice
remediation.detection.webservice=http://localhost:8000/

#############
# INJECTORS #
#############

# Mail config (Always available)
veriguard.default-mailer=no-reply@veriguard.io
veriguard.default-reply-to=contact@veriguard.io
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=<login user to smtp server>
spring.mail.password=<login password to smtp server>
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
veriguard.listener.smtp.enabled=false
# IMAP Configuration
veriguard.mail.imap.enabled=false
veriguard.mail.imap.host=imap.mail.com
veriguard.mail.imap.username=<username@mail.com>
veriguard.mail.imap.password=<<password>
veriguard.mail.imap.port=993
veriguard.mail.imap.inbox=INBOX
veriguard.mail.imap.sent=Sent
# Extra IMAP configuration
veriguard.mail.imap.ssl.trust=*
veriguard.mail.imap.ssl.enable=true
veriguard.mail.imap.auth=true
veriguard.mail.imap.starttls.enable=true

# Mastodon config
mastodon.enable=false

# Airbus LADE config
lade.enable=false

# Injector Http config
http.enable=false

# Injector Caldera config
injector.caldera.enable=false

# AI configuration
ai.enabled=true
ai.type=openai
ai.model=gpt-4
ai.token=test-ai-token
ai.endpoint=http://localhost/ai

# XLS Import
veriguard.xls.import.mail.enable=true

