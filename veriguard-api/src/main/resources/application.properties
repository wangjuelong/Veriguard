## Veriguard sandbox (CAPEv2) integration — M1 placeholder, M2 enables startup validation.
## Generate the API token on the CAPEv2 host:  python manage.py drf_create_token <user>
## endpoint and api-token MUST be supplied via environment variables once M2 ships;
## M1 leaves them commented out so the platform can boot without CAPEv2 reachable.
#veriguard.sandbox.cape.endpoint=${VERIGUARD_SANDBOX_CAPE_ENDPOINT}
#veriguard.sandbox.cape.api-token=${VERIGUARD_SANDBOX_CAPE_API_TOKEN}
veriguard.sandbox.cape.connect-timeout=5s
veriguard.sandbox.cape.read-timeout=30s
veriguard.sandbox.cape.sample-submit-timeout=60s

## Multipart upload limits for sandbox sample submission (used by M3 endpoints).
spring.servlet.multipart.max-file-size=64MB
spring.servlet.multipart.max-request-size=64MB