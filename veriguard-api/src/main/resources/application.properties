### Expectation

veriguard.expectation.technical.expiration-time=21600
#veriguard.expectation.detection.expiration-time=21600
#veriguard.expectation.prevention.expiration-time=21600

veriguard.expectation.human.expiration-time=86400
#veriguard.expectation.challenge.expiration-time=3600
#veriguard.expectation.article.expiration-time=3600
#veriguard.expectation.manual.expiration-time=3600

# Min value: 1
# Max value: 100
# Default value: 50
veriguard.expectation.manual.default-score-value=50


#Health check
# a unique random string used when calling the health endpoint
