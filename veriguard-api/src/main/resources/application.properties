# Global configuration
# suppress inspection "SpringBootApplicationProperties"
info.app.name=@project.description@
# suppress inspection "SpringBootApplicationProperties"
info.app.version=@project.version@

# Veriguard General Configuration
veriguard.name=@project.name@
veriguard.version=@project.version@
veriguard.base-url=http://localhost:8080
veriguard.application-license=
# veriguard.logout-success-url=/
# Setting up the frontend url if frontend and backend are on a different server
# veriguard.frontend-url=/
veriguard.cookie-name=veriguard_token
veriguard.cookie-secure=false
veriguard.cookie-duration=P1D
veriguard.unsecured-certificate=false
veriguard.with-proxy=false
veriguard.extra-trusted-certs-dir=
#veriguard.admin.email=admin@veriguard.io # mandatory
#veriguard.admin.password=ChangeMe # mandatory
#veriguard.admin.token=ChangeMe # mandatory
#veriguard.admin.encryption_key=ChangeMe #mandatory
#veriguard.admin.encryption_salt=ChangeMe #mandatory - should be at least 8 bytes long
veriguard.starterpack.enabled=true

########################
# RUNTIME DEPENDENCIES #
########################
# PostgreSQL, MinIO and RabbitMQ must be configured (and running) for Veriguard to work properly

### POSTGRESQL Configuration
### see also: https://docs.veriguard.io/latest/deployment/configuration/#postgresql
# connection URL to the PostgreSQL server
# example: jdbc:postgresql://localhost:5432
spring.datasource.url=<jdbc:postgresql://...>
# Username: should be identical to the username set on the database instance
spring.datasource.username=veriguard
# Password: the password for the username set above
spring.datasource.password=<password>
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true

### ENGINE Configuration
# selector can be elk or opensearch
engine.engine-aws-mode=no
engine.engine-selector=elk
engine.index-prefix=veriguard
engine.index-suffix=-000001
engine.url=http://localhost:9200

### MINIO Configuration
### see also: https://docs.veriguard.io/latest/deployment/configuration/#s3-bucket
# hostname of the S3 bucket service
minio.endpoint=localhost
# Port of the MinIO server
minio.port=9000
# Name of the bucket; the default is fine
minio.bucket=veriguard
# key and secret for accessing the bucket
minio.access-key=<key>
minio.access-secret=<secret>
# S3 configuration
veriguard.s3.use-aws-role=false
veriguard.s3.sts-endpoint=

### RABBITMQ settings
### see also: https://docs.veriguard.io/latest/deployment/configuration/#rabbitmq
# hostname and port of the RabbitMQ server
veriguard.rabbitmq.hostname=localhost
veriguard.rabbitmq.port=5672
veriguard.rabbitmq.prefix=veriguard
veriguard.rabbitmq.user=guest
veriguard.rabbitmq.pass=guest
veriguard.rabbitmq.vhost=/
# enable TLS for encrypted connections
veriguard.rabbitmq.ssl=false
veriguard.rabbitmq.management-port=15672
# RabbitMQ queue type ("classic" or "quorum")
veriguard.rabbitmq.queue-type=classic
# Whether or not the calls to the management plugin of rabbitmq can be insecure
veriguard.rabbitmq.management-insecure=true
# if the SSL key is set to true and Insecure Management to false,
# fill in the following settings to enable access
veriguard.rabbitmq.trust-store-password=<trust-store-password>
veriguard.rabbitmq.trust.store=<file:/path/to/client-store.p12>

veriguard.queue-config.inject-trace.publisher-number=2
veriguard.queue-config.inject-trace.consumer-number=8
veriguard.queue-config.inject-trace.worker-number=8
veriguard.queue-config.inject-trace.worker-frequency=10000
veriguard.queue-config.inject-trace.queue-name=inject-trace
veriguard.queue-config.inject-trace.max-size=200
veriguard.queue-config.inject-trace.consumer-qos=1000
veriguard.queue-config.inject-trace.publisher-qos=0

# Web server configuration
server.address=0.0.0.0
server.port=8080
server.servlet.context-path=/
server.servlet.session.timeout=1440m
server.ssl.enabled=false
server.http2.enabled=true
server.ssl.key-store-type=PKCS12
server.ssl.key-store=classpath:localhost.p12
server.ssl.key-store-password=admin
server.ssl.key-alias=localhost
server.compression.enabled=true

# Authenticators
## Local
veriguard.auth-local-enable=true
## Oauth
veriguard.auth-openid-enable=false
## Configuration examples
### Auth0
# spring.security.oauth2.client.provider.{registrationId}.issuer-uri=https://auth.auth0.io/
# spring.security.oauth2.client.registration.{registrationId}.client-name=Login with auth0
# spring.security.oauth2.client.registration.{registrationId}.client-id=
# spring.security.oauth2.client.registration.{registrationId}.client-secret=
# spring.security.oauth2.client.registration.{registrationId}.redirect-uri=${veriguard.base-url}/login/oauth2/code/{registrationId}
# spring.security.oauth2.client.registration.{registrationId}.scope=openid,profile,email
### GitHub / Facebook or any other pre handled OAuth2
# spring.security.oauth2.client.registration.{registrationId}.client-name=Login with Github
# spring.security.oauth2.client.registration.{registrationId}.client-id=
# spring.security.oauth2.client.registration.{registrationId}.client-secret=

## Saml2
veriguard.auth-saml2-enable=false
## Configuration examples
### Microsoft / Okta or any other saml2 providers
# spring.security.saml2.relyingparty.registration.{registrationId}.entity-id=
# spring.security.saml2.relyingparty.registration.{registrationId}.assertingparty.metadata-uri=
#### saml attibutes keys for firstname & lastname
# veriguard.provider.{registrationId}.firstname_attribute_key=
# veriguard.provider.{registrationId}.lastname_attribute_key=

## Oauth & Saml2
### To handle admin with sso
# veriguard.provider.{registrationId}.roles_path=
# veriguard.provider.{registrationId}.roles_admin=
# veriguard.provider.{registrationId}.audience=
# veriguard.provider.{registrationId}.groups_management=

## Kerberos
veriguard.auth-kerberos-enable=false

# Technical
server.forward-headers-strategy=framework
spring.servlet.multipart.max-file-size=5GB
spring.servlet.multipart.max-request-size=5GB
spring.application.name=${veriguard.name}
spring.quartz.properties.org.quartz.scheduler.instanceName=Veriguard_Scheduler
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.quartz.properties.org.quartz.threadPool.threadCount=10
spring.data.rest.basePath=/api
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.validatorUrl=none

# Encoding
spring.mail.default-encoding=UTF-8
spring.messages.encoding=UTF-8
server.tomcat.uri-encoding=UTF-8
spring.freemarker.charset=UTF-8
server.servlet.encoding.charset=UTF-8

# ORM
spring.jpa.hibernate.ddl-auto=none
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Database schema migrations
spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}
spring.flyway.table=migrations
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.postgresql.transactional-lock=false

# AI Properties
ai.enabled=false
ai.type=mistralai
ai.endpoint=
ai.token=
ai.model=mistral
ai.model_images=

# Inject execution threshold, by default it's 10minutes
inject.execution.threshold.minutes=

# Logging
logging.level.root=fatal
logging.level.org.flywaydb=error
logging.level.io.veriguard=error
logging.level.com.zaxxer.hikari=warn
logging.file.name=./logs/veriguard.log
logging.logback.rollingpolicy.file-name-pattern=${LOG_FILE}.-%d{yyyy-MM-dd}.%i
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

