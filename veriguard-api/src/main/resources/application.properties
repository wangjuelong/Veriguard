# Mail sending config (Always available, mandatory)
veriguard.default-mailer=no-reply@veriguard.io
veriguard.default-reply-to=contact@veriguard.io
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=<username@mail.com>
spring.mail.password=<password>
# Extra mail configuration
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.starttls.enable=true
# IMAP Configuration
veriguard.mail.imap.enabled=false
veriguard.mail.imap.host=imap.mail.com
veriguard.mail.imap.username=<username@mail.com>
veriguard.mail.imap.password=<password>
veriguard.mail.imap.port=993
veriguard.mail.imap.inbox=INBOX
veriguard.mail.imap.sent=Sent
# Extra IMAP configuration
veriguard.mail.imap.ssl.trust=*
veriguard.mail.imap.ssl.enable=true
veriguard.mail.imap.auth=true
veriguard.mail.imap.starttls.enable=false
# XLS Import
veriguard.xls.import.mail.enable=true

# Injector Caldera config
injector.caldera.enable=false
injector.caldera.id=7736918d-6a3f-46c7-b303-cbf5dc476c84
injector.caldera.url=<caldera-url>
injector.caldera.public-url=<caldera-public-url>
injector.caldera.api-key=<caldera-api-key>

# Mastodon config
mastodon.enable=false
mastodon.url=<url>

# Airbus LADE config
lade.enable=false
lade.url=<url>
lade.session=30
lade.username=<username>
